name: Deploy to Azure App Service

# Deploys the app whenever you push to main.
# Set up: in the Azure Portal open your Web App > Deployment Center > download
# the Publish Profile, then add it as a GitHub secret named AZURE_WEBAPP_PUBLISH_PROFILE.
# Also set AZURE_WEBAPP_NAME below to your Web App name.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-azure-webapp-name   # <-- change this
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
