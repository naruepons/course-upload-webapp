<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload หลักสูตร | Course File Upload</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --ok: #16a34a;
      --err: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", "Sarabun", Tahoma, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px; gap: 20px;
    }
    .card {
      background: var(--card); width: 100%; max-width: 640px;
      border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,.08);
      padding: 32px; border: 1px solid var(--border);
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    h2 { font-size: 17px; margin: 0 0 14px; }
    .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
    label { display: block; font-size: 14px; font-weight: 600; margin: 16px 0 6px; }
    input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px;
    }
    .dropzone {
      border: 2px dashed #c7d2fe; border-radius: 12px; padding: 28px 16px;
      text-align: center; cursor: pointer; background: #f8faff; transition: .15s; margin-top: 6px;
    }
    .dropzone.drag { background: #eef2ff; border-color: var(--primary); }
    .dropzone p { margin: 6px 0; color: var(--muted); font-size: 14px; }
    .dropzone strong { color: var(--primary); }
    .filename { font-size: 14px; margin-top: 10px; color: var(--text); word-break: break-all; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    button {
      margin-top: 22px; width: 100%; padding: 12px; border: 0; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button.secondary { background: #eef2ff; color: var(--primary); }
    button:hover { filter: brightness(.97); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .status { margin-top: 18px; font-size: 14px; padding: 12px 14px; border-radius: 8px; display: none; }
    .status.show { display: block; }
    .status.ok { background: #f0fdf4; color: var(--ok); border: 1px solid #bbf7d0; }
    .status.err { background: #fef2f2; color: var(--err); border: 1px solid #fecaca; }
    .status.info { background: #eff6ff; color: var(--primary-dark); border: 1px solid #bfdbfe; }
    .status a { color: inherit; font-weight: 600; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input[type="file"] { display: none; }
    ul.files { list-style: none; padding: 0; margin: 0; }
    ul.files li {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
    }
    ul.files li:last-child { border-bottom: 0; }
    ul.files .fname { word-break: break-all; }
    ul.files .actions { display: flex; gap: 8px; flex-shrink: 0; }
    ul.files a, ul.files button.mini {
      font-size: 12px; padding: 5px 10px; border-radius: 6px; text-decoration: none;
      border: 1px solid var(--border); background: #fff; color: var(--primary); cursor: pointer; margin: 0; width: auto;
    }
    .empty { color: var(--muted); font-size: 14px; }
    .analysis { margin-top: 16px; font-size: 14px; display: none; }
    .analysis.show { display: block; }
    .analysis h3 { font-size: 15px; margin: 16px 0 6px; color: var(--primary-dark); }
    .analysis .box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
    .analysis ul { margin: 4px 0; padding-left: 20px; }
    .qsec { border-left: 3px solid var(--primary); padding-left: 12px; margin: 10px 0; }
    .qsec .qtype { color: var(--muted); font-size: 12px; }
    /* ===== Question page (rendered form) ===== */
    .formpage { display: none; width: 100%; max-width: 640px; }
    .formpage.show { display: block; }
    .formpage .fhead {
      background: var(--card); border: 1px solid var(--border); border-top: 6px solid var(--primary);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 14px;
    }
    .formpage .fhead h2 { margin: 0 0 6px; font-size: 20px; }
    .formpage .fhead p { margin: 0; color: var(--muted); font-size: 14px; }
    .formpage .fsec {
      background: #eef2ff; color: var(--primary-dark); font-weight: 700; font-size: 15px;
      border-radius: 10px; padding: 10px 16px; margin: 18px 0 10px;
    }
    .formpage .fq {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 12px;
    }
    .formpage .fq .qtext { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .formpage .fq .qmeta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .formpage .opt { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 14px; }
    .formpage .scale { display: flex; justify-content: space-between; align-items: center; gap: 4px; margin-top: 8px; }
    .formpage .scale label { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); flex: 1; margin: 0; font-weight: 400; }
    .formpage textarea {
      width: 100%; min-height: 70px; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical;
    }
    .formpage .fnote { font-size: 12px; color: var(--muted); text-align: center; margin: 10px 0 0; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #bfdbfe; border-top-color: var(--primary); border-radius:50%; animation: spin .8s linear infinite; vertical-align:-2px; margin-right:6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- ===== Upload ===== -->
  <div class="card">
    <h1>อัปโหลดไฟล์หลักสูตร</h1>
    <p class="sub">ไฟล์จะถูกจัดเก็บใน GitHub repository โดยตรง (ไม่เก็บบน Azure)</p>

    <div class="row">
      <div>
        <label for="courseName">ชื่อหลักสูตร</label>
        <input type="text" id="courseName" placeholder="เช่น AI for Leader" />
      </div>
      <div>
        <label for="courseCode">รหัสหลักสูตร</label>
        <input type="text" id="courseCode" placeholder="เช่น SF_15261" />
      </div>
    </div>

    <label>ไฟล์หลักการและเหตุผล (Word / PDF)</label>
    <div class="dropzone" id="dropzone">
      <p><strong>คลิกเพื่อเลือกไฟล์</strong> หรือลากไฟล์มาวางที่นี่</p>
      <p class="hint">รองรับ .pdf .docx .txt (วิเคราะห์ AI ได้)</p>
      <div class="filename" id="filename"></div>
    </div>
    <input type="file" id="fileInput" />

    <div class="row">
      <button id="submitBtn" disabled>Submit — อัปโหลดและสร้างแบบประเมิน</button>
      <button id="analyzeBtn" class="secondary" disabled title="วิเคราะห์ไฟล์ด้วย AI โดยไม่ต้องอัปโหลด">วิเคราะห์อย่างเดียว</button>
    </div>

    <div class="status" id="status"></div>
    <div class="analysis" id="analysis"></div>
  </div>

  <!-- ===== Question page (rendered from AI analysis) ===== -->
  <div class="formpage" id="formpage"></div>

  <!-- ===== Files list ===== -->
  <div class="card">
    <h2>ไฟล์ที่อัปโหลดแล้ว</h2>
    <ul class="files" id="filesList"><li class="empty">กำลังโหลด...</li></ul>
    <button class="secondary" id="refreshBtn">รีเฟรชรายการ</button>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fileInput = $('fileInput'), dropzone = $('dropzone'), filenameEl = $('filename');
    const submitBtn = $('submitBtn'), analyzeBtn = $('analyzeBtn');
    const statusEl = $('status'), analysisEl = $('analysis'), filesList = $('filesList');
    let selectedFile = null;

    const UPLOAD_KEY = ''; // set if server requires x-upload-key

    function headers() { return UPLOAD_KEY ? { 'x-upload-key': UPLOAD_KEY } : {}; }
    function meta() {
      return { courseName: $('courseName').value, courseCode: $('courseCode').value };
    }
    function setFile(file) {
      selectedFile = file;
      filenameEl.textContent = file ? '📄 ' + file.name : '';
      submitBtn.disabled = !file;
      analyzeBtn.disabled = !file;
    }
    function showStatus(kind, html) {
      statusEl.className = 'status show ' + kind;
      statusEl.innerHTML = html;
    }

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => setFile(e.target.files[0]));
    ['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
    dropzone.addEventListener('drop', e => { if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]); });

    function buildForm() {
      const form = new FormData();
      form.append('file', selectedFile);
      form.append('courseName', meta().courseName);
      form.append('courseCode', meta().courseCode);
      return form;
    }

    async function runAnalyze(formData) {
      const res = await fetch('/api/analyze', { method: 'POST', body: formData, headers: headers() });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'วิเคราะห์ไม่สำเร็จ');
      return data.analysis;
    }

    // ---- Submit: upload -> AI analyze (หลักการและเหตุผล) -> render question page ----
    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      submitBtn.disabled = true; analyzeBtn.disabled = true;
      $('formpage').className = 'formpage';
      const fileForUpload = buildForm();
      const fileForAnalyze = buildForm();

      // Step 1: upload to GitHub (non-blocking for analysis if it fails)
      showStatus('info', '<span class="spinner"></span> (1/2) กำลังอัปโหลดไฟล์...');
      let uploadNote = '';
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fileForUpload, headers: headers() });
        const data = await res.json();
        if (data.ok) {
          const link = data.htmlUrl ? ` — <a href="${data.htmlUrl}" target="_blank">ดูใน GitHub</a>` : '';
          uploadNote = `✅ อัปโหลดสำเร็จ: <b>${esc(data.originalName)}</b>${link}`;
          loadFiles();
        } else {
          uploadNote = '⚠️ อัปโหลดไม่สำเร็จ (' + esc(data.error || '') + ') แต่จะวิเคราะห์ต่อ';
        }
      } catch (err) {
        uploadNote = '⚠️ อัปโหลดไม่สำเร็จ (' + esc(err.message) + ') แต่จะวิเคราะห์ต่อ';
      }

      // Step 2: analyze rationale & generate questions
      showStatus('info', uploadNote + '<br><span class="spinner"></span> (2/2) กำลังวิเคราะห์หลักการและเหตุผล และสร้างคำถาม...');
      try {
        const analysis = await runAnalyze(fileForAnalyze);
        showStatus('ok', uploadNote + '<br>✅ สร้างแบบประเมินเสร็จแล้ว — เลื่อนลงเพื่อดูหน้าคำถาม');
        renderAnalysis(analysis);
        renderQuestionPage(analysis);
        setFile(null); fileInput.value = '';
      } catch (err) {
        showStatus('err', uploadNote + '<br>❌ ' + esc(err.message));
        submitBtn.disabled = false; analyzeBtn.disabled = false;
      }
    });

    // ---- Analyze only (no upload) ----
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      analyzeBtn.disabled = true;
      showStatus('info', '<span class="spinner"></span> กำลังวิเคราะห์ด้วย AI...');
      analysisEl.className = 'analysis';
      $('formpage').className = 'formpage';
      try {
        const analysis = await runAnalyze(buildForm());
        analyzeBtn.disabled = false;
        showStatus('ok', '✅ วิเคราะห์เสร็จแล้ว');
        renderAnalysis(analysis);
        renderQuestionPage(analysis);
      } catch (err) { analyzeBtn.disabled = false; showStatus('err', '❌ ' + esc(err.message)); }
    });

    function li(label, val) {
      if (val == null || (Array.isArray(val) && !val.length)) return '';
      const body = Array.isArray(val) ? '<ul>' + val.map(v => `<li>${esc(v)}</li>`).join('') + '</ul>' : esc(val);
      return `<h3>${label}</h3><div class="box">${body}</div>`;
    }
    function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function renderAnalysis(a) {
      const cu = a.course_understanding || {};
      const form = a.evaluation_form || {};
      let html = '<h3>สรุปความเข้าใจหลักสูตร (Course Understanding)</h3>';
      html += li('Course Goal', cu.course_goal);
      html += li('Target Audience', cu.target_audience);
      html += li('Learning Objectives', cu.key_learning_objectives);
      html += li('Key Modules', cu.key_modules);
      html += li('Core Skills', cu.core_skills);
      html += li('Expected Outcomes', cu.expected_outcomes);
      html += li('Risk / Limitation Topics', cu.risk_or_limitation_topics);
      html += li('Evaluation Focus', cu.evaluation_focus);

      if (form.sections && form.sections.length) {
        html += `<h3>แบบประเมินที่สร้าง (Draft — ต้องผ่าน Human Review)</h3>`;
        if (form.title) html += `<div class="box"><b>${esc(form.title)}</b>${form.instruction ? '<br>' + esc(form.instruction) : ''}</div>`;
        form.sections.forEach(sec => {
          html += `<div class="qsec"><b>${esc(sec.section_name)}</b>`;
          (sec.questions || []).forEach((q, i) => {
            html += `<div style="margin-top:6px">${i+1}. ${esc(q.question_text)} <span class="qtype">[${esc(q.question_type||'')}${q.linked_to ? ' · '+esc(q.linked_to) : ''}]</span>`;
            if (q.answer_options && q.answer_options.length) html += '<ul>' + q.answer_options.map(o => `<li>${esc(o)}</li>`).join('') + '</ul>';
            html += `</div>`;
          });
          html += `</div>`;
        });
      }
      analysisEl.innerHTML = html;
      analysisEl.className = 'analysis show';
    }

    // ---- Render the generated questions as a real question page ----
    function renderQuestionPage(a) {
      const fp = $('formpage');
      const form = (a && a.evaluation_form) || {};
      const sections = form.sections || [];
      if (!sections.length) { fp.className = 'formpage'; fp.innerHTML = ''; return; }

      const cName = $('courseName').value.trim();
      const cCode = $('courseCode').value.trim();
      let html = `<div class="fhead">
        <h2>${esc(form.title || 'แบบประเมินหลังการอบรม')}</h2>
        ${cName || cCode ? `<p><b>${esc(cName)}</b>${cCode ? ' (' + esc(cCode) + ')' : ''}</p>` : ''}
        ${form.instruction ? `<p>${esc(form.instruction)}</p>` : ''}
      </div>`;

      let qn = 0;
      sections.forEach((sec, si) => {
        html += `<div class="fsec">ส่วนที่ ${si + 1}: ${esc(sec.section_name || '')}</div>`;
        (sec.questions || []).forEach((q) => {
          qn++;
          const name = 'q' + qn;
          html += `<div class="fq">
            <div class="qtext">${qn}. ${esc(q.question_text)}</div>
            <div class="qmeta">[${esc(q.question_type || '')}${q.linked_to ? ' · อิงจาก: ' + esc(q.linked_to) : ''}]</div>`;
          if (q.question_type === 'rating') {
            html += `<div class="scale">` +
              [1,2,3,4,5].map(v => `<label><input type="radio" name="${name}" value="${v}">${v}</label>`).join('') +
              `</div><div class="scale"><span class="hint">น้อยที่สุด</span><span class="hint" style="margin-left:auto">มากที่สุด</span></div>`;
          } else if (q.question_type === 'multiple_choice' && q.answer_options && q.answer_options.length) {
            html += q.answer_options.map(o =>
              `<label class="opt"><input type="radio" name="${name}" value="${esc(o)}">${esc(o)}</label>`).join('');
          } else {
            html += `<textarea placeholder="พิมพ์คำตอบของคุณ..."></textarea>`;
          }
          html += `</div>`;
        });
      });
      html += `<p class="fnote">Draft สร้างโดย AI จากไฟล์หลักการและเหตุผล — ต้องผ่าน Human Review ก่อนใช้งานจริง</p>`;

      fp.innerHTML = html;
      fp.className = 'formpage show';
      fp.scrollIntoView({ behavior: 'smooth' });
    }

    // ---- Files list ----
    async function loadFiles() {
      filesList.innerHTML = '<li class="empty">กำลังโหลด...</li>';
      try {
        const res = await fetch('/api/files');
        const data = await res.json();
        if (!data.ok) { filesList.innerHTML = `<li class="empty">${esc(data.error)}</li>`; return; }
        if (!data.files.length) { filesList.innerHTML = '<li class="empty">ยังไม่มีไฟล์</li>'; return; }
        filesList.innerHTML = data.files.map(f => `
          <li>
            <span class="fname">📄 ${esc(f.name)} <span class="hint">(${(f.sizeBytes/1024).toFixed(0)} KB)</span></span>
            <span class="actions">
              <a href="${f.htmlUrl}" target="_blank">GitHub</a>
              <button class="mini" data-path="${esc(f.path)}">วิเคราะห์</button>
            </span>
          </li>`).join('');
        filesList.querySelectorAll('button.mini').forEach(btn =>
          btn.addEventListener('click', () => analyzeStored(btn.dataset.path, btn)));
      } catch (err) { filesList.innerHTML = `<li class="empty">โหลดรายการไม่สำเร็จ: ${esc(err.message)}</li>`; }
    }

    async function analyzeStored(repoPath, btn) {
      btn.disabled = true; btn.textContent = 'กำลังวิเคราะห์...';
      showStatus('info', '<span class="spinner"></span> กำลังวิเคราะห์ไฟล์จาก GitHub...');
      analysisEl.className = 'analysis';
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...headers() },
          body: JSON.stringify({ repoPath, ...meta() }),
        });
        const data = await res.json();
        btn.disabled = false; btn.textContent = 'วิเคราะห์';
        if (data.ok) { showStatus('ok', '✅ วิเคราะห์เสร็จแล้ว: ' + esc(data.sourceName)); renderAnalysis(data.analysis); renderQuestionPage(data.analysis); }
        else showStatus('err', '❌ ' + (data.error || 'วิเคราะห์ไม่สำเร็จ'));
      } catch (err) { btn.disabled = false; btn.textContent = 'วิเคราะห์'; showStatus('err', '❌ ' + err.message); }
    }

    $('refreshBtn').addEventListener('click', loadFiles);
    loadFiles();
  </script>
</body>
</html>
